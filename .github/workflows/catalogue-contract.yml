name: Catalogue contract

on:
  pull_request:
    paths:
      - "skills/**"
  push:
    branches: [main]
    paths:
      - "skills/**"

permissions:
  contents: read

jobs:
  catalogue-contract:
    uses: NestDevLab/agentwheel/.github/workflows/catalogue-sync.yml@8804266ea7c53a9f5c98edcd372dcbecbb16005a
    with:
      publish: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    secrets:
      APP_ID: ${{ secrets.AGENTWHEEL_CATALOGUE_APP_ID }}
      PRIVATE_KEY: ${{ secrets.AGENTWHEEL_CATALOGUE_PRIVATE_KEY }}
